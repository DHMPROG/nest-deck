# Processed as an nginx template: ${BACKEND_URL} is substituted at container
# start (envsubst), everything else — $uri, $host — is left untouched because
# it is not an environment variable.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # API (REST + SSE) is proxied to the backend, so the client can keep using
    # a relative /api and only this one port needs to reach the network.
    #   BACKEND_URL = http://backend:8000            (backend in Docker)
    #               = http://host.docker.internal:8000 (backend native on the host)
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Server-Sent Events: don't buffer, and don't time the stream out.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # SPA: every route falls back to index.html (adapter-static fallback).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached, or the Nest Hub keeps a stale build
    # alive across the 9-minute reload cycle.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
