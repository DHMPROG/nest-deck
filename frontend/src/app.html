<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <!-- Kiosk: pin the viewport, no pinch-zoom on the Nest Hub panel. -->
    <meta
      name="viewport"
      content="width=1280, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#FAF9F7" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
